<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Supabase Auth</title>
  <link rel="icon" type="image/svg+xml" href="images/unipacklogo.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="header-logo">
        <img src="images/unipacklogo.svg" alt="UniPack Logo" class="logo" />
      </div>
      <h1>Register</h1>
      <form id="registerForm">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password" required minlength="6" />

        <label for="role">Register as</label>
        <select id="role" required>
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>

        <button type="submit">Create Account</button>
      </form>
      <p class="note">Already registered? <a href="index.html">Sign in</a></p>
      <p id="message" class="message"></p>
    </section>
  </main>

  <script type="module">
    import { supabase } from './supabase.js';

    const registerForm = document.getElementById('registerForm');
    const message = document.getElementById('message');

    async function showMessage(text, isError = false) {
      message.textContent = text;
      message.className = isError ? 'message error' : 'message success';
    }

    registerForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      showMessage('Creating account...');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { role } },
      });
      if (error) {
        showMessage(error.message, true);
        return;
      }

      const user = data?.user ?? data?.session?.user;
      if (user) {
        const { error: logError } = await supabase.from('logs').insert([
          {
            user_id: user.id,
            email,
            role,
          },
        ]);

        if (logError) {
          console.error('Failed to log user:', logError);
        }
      }

      showMessage('Registration successful! Redirecting...');
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1500);
    });
  </script>
</body>
</html>
