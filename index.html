<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Supabase Auth</title>
  <link rel="icon" type="image/png" href="images/unipacklogo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="header-logo">
        <img src="images/unipacklogo.png" alt="UniPack Logo" class="logo" />
      </div>
      <h1>Login</h1>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password" required />

        <button type="submit">Sign In</button>
      </form>
      <p class="note">No account? <a href="register.html">Register here</a></p>
      <p id="message" class="message"></p>
      <p class="version">Version 1.1</p>
    </section>
  </main>

  <script type="module">
    import { supabase } from './supabase.js';

    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');

    async function showMessage(text, isError = false) {
      message.textContent = text;
      message.className = isError ? 'message error' : 'message success';
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      showMessage('Signing in...');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        showMessage(error.message, true);
        return;
      }

      showMessage('Signed in successfully! Redirecting...');
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
